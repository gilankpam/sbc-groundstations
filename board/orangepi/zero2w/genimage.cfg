# Orange Pi Zero 2W SD image (Allwinner sunxi)
# Just SPL + squashfs rootfs; the firstboot /init creates+formats the overlay
# and DVR partitions and expands them to fill the SD (needs the real mke2fs from
# e2fsprogs — busybox mke2fs can't do `-t ext4`, see BR2_PACKAGE_E2FSPROGS).
image sdcard.img {
	hdimage {
		partition-table-type = "mbr"
	}

	# sunxi SPL + U-Boot, written raw at 8 KiB (not in the partition table)
	partition spl {
		in-partition-table = "false"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
	}

	# rootfs starts well past the U-Boot reservation
	partition rootfs {
		partition-type = 0x83
		image = "rootfs.squashfs"
		offset = 16M
		bootable = "true"
	}
}

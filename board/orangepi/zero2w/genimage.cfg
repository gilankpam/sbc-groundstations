# Orange Pi Zero 2W SD image (Allwinner sunxi)

# Empty ext4 for the rootfs overlay (writable layer). Pre-created + labeled so the
# firstboot /init finds it (blkid LABEL=overlayfs) and skips its repartition path,
# which fails to format this ext4 on our MBR layout. /init still creates the DVR
# partition on first boot (that path works on MBR).
image overlayfs.ext4 {
	ext4 {
		label = "overlayfs"
	}
	size = 256M
}

image sdcard.img {
	hdimage {
		partition-table-type = "mbr"
	}

	# sunxi SPL + U-Boot, written raw at 8 KiB (not in the partition table)
	partition spl {
		in-partition-table = "false"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
	}

	# rootfs starts well past the U-Boot reservation
	partition rootfs {
		partition-type = 0x83
		image = "rootfs.squashfs"
		offset = 16M
		bootable = "true"
	}

	# pre-formatted overlay partition (see overlayfs.ext4 above)
	partition overlayfs {
		partition-type = 0x83
		image = "overlayfs.ext4"
	}
}
